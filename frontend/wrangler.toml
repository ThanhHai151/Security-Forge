# Cloudflare Workers — Static Assets. Deploys the built SPA in ./dist as a
# static-assets-only Worker (no server code). This is the config the dashboard
# "Workers" import flow uses:
#
#   Build command:   npm run build
#   Deploy command:  npx wrangler deploy
#   Root directory:  frontend          (Advanced settings — REQUIRED)
#
# `wrangler deploy` runs from the Root directory (frontend/), reads this file,
# and uploads ./dist (i.e. frontend/dist). The _headers and _redirects files in
# dist/ are honored by Workers Static Assets.
name = "security-forge"
compatibility_date = "2024-11-01"

[assets]
directory = "./dist"
# Hash-router SPA: serve index.html for any unmatched path so deep links work.
not_found_handling = "single-page-application"
